name: CI

on:
  push:
    branches:
      - main
      - "v*"
      - "codex/**"
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: python -m pip install -e ".[dev]"
        working-directory: backend

      - name: Run backend tests
        run: pytest
        working-directory: backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Install frontend
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

  paragraph-summary-service:
    name: Paragraph summary service tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/paragraph-summary-service/requirements.txt

      - name: Install paragraph summary service
        run: python -m pip install -r requirements.txt
        working-directory: services/paragraph-summary-service

      - name: Run paragraph summary service tests
        run: PYTHONPATH=. pytest
        working-directory: services/paragraph-summary-service
