services:
  paragraph-summary-service:
    build:
      context: services/paragraph-summary-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      SUMMARY_SERVICE_PROVIDER: mock
      SUMMARY_LANE_COUNT: "10"
      SUMMARY_LANE_RPM: "1"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DEEPREADER_DATABASE_URL: sqlite:////app/data/deepreader.sqlite3
      DEEPREADER_MAX_UPLOAD_BYTES: "10485760"
      DEEPREADER_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DEEPREADER_SUMMARY_BACKEND: ${DEEPREADER_SUMMARY_BACKEND:-local}
      DEEPREADER_ALLOW_REMOTE_SUMMARY_SERVICE: ${DEEPREADER_ALLOW_REMOTE_SUMMARY_SERVICE:-false}
      PARAGRAPH_SUMMARY_SERVICE_URL: http://paragraph-summary-service:8001
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    depends_on:
      - paragraph-summary-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:
